<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flash Cards</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FlashCards" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1a2e; --paper: #f7f5f0; --card-bg: #ffffff;
      --accent: #4f46e5; --accent2: #7c3aed; --muted: #6b7280;
      --border: #e5e2db; --shadow: 0 8px 32px rgba(79,70,229,.12);
      --danger: #ef4444;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center;
      padding: calc(40px + var(--safe-top)) 16px calc(80px + var(--safe-bottom));
    }

    /* ── install banner ── */
    #installBanner {
      display: none;
      position: fixed; bottom: calc(16px + var(--safe-bottom)); left: 50%;
      transform: translateX(-50%);
      background: var(--ink); color: #fff;
      border-radius: 16px; padding: 14px 20px;
      font-size: .85rem; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
      max-width: 340px; width: calc(100% - 32px);
      z-index: 200; line-height: 1.5;
    }
    #installBanner.show { display: block; }
    #installBanner strong { color: #a5b4fc; }
    .banner-close {
      display: inline-block; margin-top: 10px;
      background: #ffffff22; border: 1px solid #ffffff44;
      color: #fff; border-radius: 8px; padding: 5px 16px;
      font-size: .8rem; cursor: pointer;
    }

    header { text-align: center; margin-bottom: 32px; }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem,5vw,3rem);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -.5px;
    }
    header p { color: var(--muted); font-size: .9rem; margin-top: 8px; }

    .toolbar {
      max-width: 960px; width: 100%;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .btn-add {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 12px;
      padding: 10px 20px; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .15s; white-space: nowrap;
    }
    .btn-add:hover { opacity: .9; transform: translateY(-1px); }
    .btn-add svg { width: 18px; height: 18px; fill: #fff; }
    .count-badge {
      margin-left: auto; font-size: .8rem; color: var(--muted);
      background: #fff; border: 1.5px solid var(--border);
      border-radius: 99px; padding: 4px 14px;
    }

    .progress {
      max-width: 960px; width: 100%;
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px; transition: width .4s ease;
    }
    .progress-text { font-size: .8rem; color: var(--muted); white-space: nowrap; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
      gap: 28px; width: 100%; max-width: 960px;
    }

    .scene { perspective: 1000px; height: 200px; cursor: pointer; position: relative; }
    .card {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
      border-radius: 18px;
    }
    .scene.flipped .card { transform: rotateY(180deg); }
    .face {
      position: absolute; inset: 0; border-radius: 18px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 20px 20px; box-shadow: var(--shadow);
    }
    .face.front { background: var(--card-bg); border: 1.5px solid var(--border); }
    .face.front .word {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; color: var(--ink); text-align: center; line-height: 1.2;
    }
    .face.front .phonetic { font-size: .8rem; color: var(--muted); margin-top: 6px; letter-spacing: .5px; }
    .face.front .pos {
      margin-top: 12px; font-size: .7rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--accent); background: #ede9fe;
      padding: 3px 10px; border-radius: 99px;
    }
    .face.front .hint { position: absolute; bottom: 12px; font-size: .7rem; color: #c4bfb8; }
    .face.back {
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent2) 100%);
      transform: rotateY(180deg); color: white; text-align: center; gap: 8px;
    }
    .face.back .meaning { font-size: 1.2rem; font-weight: 600; line-height: 1.3; }
    .face.back .example { font-size: .8rem; opacity: .85; font-style: italic; margin-top: 4px; padding: 0 8px; }

    .icon-btn {
      position: absolute; top: 10px; width: 30px; height: 30px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s; z-index: 10;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover { transform: scale(1.12); }
    .icon-btn:active { transform: scale(.93); }
    .speaker-btn { right: 46px; }
    .speaker-btn:hover { background: rgba(79,70,229,.08); }
    .speaker-btn.playing { background: #ede9fe; }
    .speaker-btn svg { width: 17px; height: 17px; fill: var(--accent); }
    .delete-btn { right: 10px; }
    .delete-btn:hover { background: rgba(239,68,68,.1); }
    .delete-btn svg { width: 15px; height: 15px; fill: var(--danger); }

    /* modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px calc(28px + var(--safe-bottom));
      width: 100%; max-width: 500px;
      box-shadow: 0 -8px 40px rgba(0,0,0,.15);
      transform: translateY(40px); transition: transform .3s cubic-bezier(.4,0,.2,1);
      max-height: 90vh; overflow-y: auto;
    }
    @media (min-width: 600px) {
      .modal { border-radius: 20px; padding: 32px 28px; transform: translateY(16px); }
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 20px; color: var(--ink); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: .4px; text-transform: uppercase; }
    .field input, .field textarea, .field select {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 9px 13px; font-size: 1rem; font-family: inherit;
      color: var(--ink); background: var(--paper);
      transition: border-color .2s; outline: none; resize: vertical;
      -webkit-appearance: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); background: #fff; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save {
      flex: 1; background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 10px;
      padding: 13px; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-save:hover { opacity: .88; }
    .btn-cancel {
      flex: 1; background: var(--paper); color: var(--muted);
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 13px; font-size: .95rem; font-weight: 600;
      cursor: pointer;
    }

    .empty {
      grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; fill: var(--border); margin-bottom: 12px; }
    .empty p { font-size: 1rem; }

    @media (prefers-reduced-motion: reduce) { .card { transition: none; } }
  </style>
</head>
<body>

<header>
  <h1>Flash Cards</h1>
  <p>Click thẻ để xem nghĩa · Click 🔊 để nghe phát âm</p>
</header>

<div class="toolbar">
  <button class="btn-add" id="btnAdd">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    Thêm từ mới
  </button>
  <span class="count-badge" id="countBadge">0 thẻ</span>
</div>

<div class="progress">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-text" id="progressText">0 / 0 đã lật</span>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Thêm từ mới</h2>
    <div class="field"><label>Từ vựng *</label><input type="text" id="inWord" placeholder="e.g. Resilience" /></div>
    <div class="field"><label>Phiên âm</label><input type="text" id="inPhonetic" placeholder="e.g. /rɪˈzɪl.i.əns/" /></div>
    <div class="field">
      <label>Loại từ</label>
      <select id="inPos">
        <option value="noun">noun – danh từ</option>
        <option value="verb">verb – động từ</option>
        <option value="adj">adj – tính từ</option>
        <option value="adv">adv – trạng từ</option>
        <option value="phrase">phrase – cụm từ</option>
      </select>
    </div>
    <div class="field"><label>Nghĩa tiếng Việt *</label><input type="text" id="inMeaning" placeholder="e.g. Khả năng phục hồi" /></div>
    <div class="field"><label>Câu ví dụ</label><textarea id="inExample" rows="2" placeholder="e.g. She showed great resilience."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Huỷ</button>
      <button class="btn-save" id="btnSave">Lưu thẻ</button>
    </div>
  </div>
</div>

<!-- iOS install hint -->
<div id="installBanner">
  📱 Cài lên iPhone: nhấn <strong>nút Chia sẻ</strong> (□↑) trong Safari<br>rồi chọn <strong>"Add to Home Screen"</strong>
  <br><button class="banner-close" id="bannerClose">Đã hiểu</button>
</div>

<script>
  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── iOS install hint ──
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = window.navigator.standalone;
  if (isIos && !isInStandalone && !localStorage.getItem('installHintShown')) {
    setTimeout(() => document.getElementById('installBanner').classList.add('show'), 2000);
  }
  document.getElementById('bannerClose').addEventListener('click', () => {
    document.getElementById('installBanner').classList.remove('show');
    localStorage.setItem('installHintShown', '1');
  });

  // ── Data ──
  const STORAGE_KEY = 'flashcards_v1';
  const defaultCards = [
    { word: "Ephemeral",   phonetic: "/ɪˈfem.ər.əl/",         pos: "adj",  meaning: "Tồn tại trong thời gian ngắn",    example: "Social media posts are often ephemeral." },
    { word: "Serendipity", phonetic: "/ˌser.ənˈdɪp.ɪ.ti/",    pos: "noun", meaning: "Sự tình cờ may mắn",              example: "Finding that job was pure serendipity." },
    { word: "Melancholy",  phonetic: "/ˈmel.ənˌkɒl.i/",        pos: "noun", meaning: "Nỗi buồn man mác, u sầu",         example: "She felt a deep melancholy after the trip." },
    { word: "Ubiquitous",  phonetic: "/juːˈbɪk.wɪ.təs/",       pos: "adj",  meaning: "Có mặt khắp nơi",                example: "Smartphones are now ubiquitous." },
    { word: "Eloquent",    phonetic: "/ˈel.ə.kwənt/",           pos: "adj",  meaning: "Hùng hồn, diễn đạt lưu loát",   example: "She gave an eloquent speech." },
    { word: "Resilience",  phonetic: "/rɪˈzɪl.i.əns/",         pos: "noun", meaning: "Khả năng phục hồi, sức bền bỉ",  example: "Children show remarkable resilience." },
    { word: "Ambiguous",   phonetic: "/æmˈbɪɡ.ju.əs/",         pos: "adj",  meaning: "Mơ hồ, có nhiều nghĩa",          example: "The instructions were ambiguous." },
    { word: "Meticulous",  phonetic: "/məˈtɪk.jʊ.ləs/",        pos: "adj",  meaning: "Tỉ mỉ, cẩn thận từng chi tiết", example: "He is meticulous about his work." },
  ];

  function loadCards() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : defaultCards; } catch { return defaultCards; } }
  function saveCards() { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); }
  let cards = loadCards();
  let flippedSet = new Set();

  function updateProgress() {
    const total = cards.length;
    document.getElementById('progressFill').style.width = (total ? flippedSet.size/total*100 : 0) + '%';
    document.getElementById('progressText').textContent = `${flippedSet.size} / ${total} đã lật`;
    document.getElementById('countBadge').textContent = `${total} thẻ`;
  }

  // ── TTS ──
  // Preload voices sớm (iOS cần được trigger trước)
  let _voices = [];
  const _loadV = () => { _voices = speechSynthesis.getVoices(); };
  _loadV();
  speechSynthesis.onvoiceschanged = _loadV;

  function speak(text, btn) {
    if (!('speechSynthesis' in window)) return;
    btn.classList.add('playing');
    const done = () => btn.classList.remove('playing');
    speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1; u.volume = 1;
    u.onend = done; u.onerror = done;

    const go = () => {
      const voices = speechSynthesis.getVoices();
      const v = voices.find(x => x.name === 'Samantha')       // iOS native
             || voices.find(x => x.name.includes('Google US'))
             || voices.find(x => x.lang === 'en-US')
             || voices.find(x => x.lang.startsWith('en'));
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    };

    if (speechSynthesis.getVoices().length) go();
    else { speechSynthesis.onvoiceschanged = go; setTimeout(go, 250); }
  }

  // ── Render ──
  const grid = document.getElementById('grid');
  function renderCard(c, i) {
    const scene = document.createElement('div');
    scene.className = 'scene';
    scene.innerHTML = `
      <div class="card">
        <div class="face front">
          <button class="icon-btn speaker-btn" title="Nghe phát âm">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          </button>
          <button class="icon-btn delete-btn" title="Xoá thẻ">
            <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
          <div class="word">${c.word}</div>
          <div class="phonetic">${c.phonetic||''}</div>
          ${c.pos ? `<div class="pos">${c.pos}</div>` : ''}
          <span class="hint">chạm để lật ↺</span>
        </div>
        <div class="face back">
          <div class="meaning">${c.meaning}</div>
          ${c.example ? `<div class="example">"${c.example}"</div>` : ''}
        </div>
      </div>`;
    scene.querySelector('.speaker-btn').addEventListener('click', e => { e.stopPropagation(); speak(c.word, scene.querySelector('.speaker-btn')); });
    scene.querySelector('.delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm(`Xoá thẻ "${c.word}"?`)) { cards.splice(i,1); saveCards(); flippedSet.clear(); renderAll(); }
    });
    scene.addEventListener('click', () => {
      scene.classList.toggle('flipped');
      scene.classList.contains('flipped') ? flippedSet.add(i) : flippedSet.delete(i);
      updateProgress();
    });
    return scene;
  }

  function renderAll() {
    grid.innerHTML = '';
    flippedSet.clear();
    if (!cards.length) {
      grid.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M20 6h-2.18c.07-.44.18-.87.18-1a3 3 0 0 0-6 0c0 .13.1.56.18 1H10a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2zm-7-1a1 1 0 1 1 2 0c0 .13-.08.52-.18 1h-1.64c-.1-.48-.18-.87-.18-1zm7 15H10V8h2.18c.07.35.12.67.12 1h4.4c0-.33.05-.65.12-1H20v12z"/></svg><p>Chưa có thẻ nào. Nhấn <strong>Thêm từ mới</strong> để bắt đầu!</p></div>`;
    } else {
      cards.forEach((c,i) => grid.appendChild(renderCard(c,i)));
    }
    updateProgress();
  }
  renderAll();

  // ── Modal ──
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('btnAdd').addEventListener('click', () => {
    ['inWord','inPhonetic','inMeaning','inExample'].forEach(id => document.getElementById(id).value='');
    document.getElementById('inPos').value='noun';
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('inWord').focus(), 300);
  });
  const closeModal = () => overlay.classList.remove('open');
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  document.getElementById('btnSave').addEventListener('click', () => {
    const word = document.getElementById('inWord').value.trim();
    const meaning = document.getElementById('inMeaning').value.trim();
    if (!word || !meaning) { alert('Vui lòng nhập Từ vựng và Nghĩa.'); return; }
    cards.push({ word, phonetic: document.getElementById('inPhonetic').value.trim(), pos: document.getElementById('inPos').value, meaning, example: document.getElementById('inExample').value.trim() });
    saveCards(); renderAll(); closeModal();
  });
  document.getElementById('modalOverlay').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) document.getElementById('btnSave').click();
    if (e.key==='Escape') closeModal();
  });
</script>
</body>
</html>
